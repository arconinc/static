<script>
	let USDollar = new Intl.NumberFormat('en-US', {
		style: 'currency',
		currency: 'USD',
	});
const getPriceEach = (quantity) => {
	if (quantity < 300) {
		return 6.0;
	} else if (quantity < 500) {
		return 5.75;
	} else if (quantity < 1000) {
		return 5.65;
	} else if (quantity < 2500) {
		return 5.5;
	} else if (quantity > 2500) {
		return 5.25;
	}
};
const arcon = window.arcon || (function (document, window, $) {
    const app = {
        init: () => {
			app.groupFields();
			app.updateCart();
			$('.nf-row').on('DOMSubtreeModified', () => {
				app.groupFields();
				app.updateCart();
			});

        },
		updateCart: () => {
			$('.quantity,.colors_first,.colors_second,.same_as_first').on('change keyup paste mouseup', () => {
				const quantity = parseInt($('.quantity').val()) || 0;
				const priceEach = getPriceEach(quantity);
				const priceEachDisplay = USDollar.format(priceEach);
				const quantityEq = `${quantity} x ${priceEachDisplay}/ea`;
				const quantityTotal = quantity * priceEach;
				$('.cart_totals td:eq(1)').text(quantityEq);
				$('.cart_totals td:eq(2)').text(USDollar.format(quantityTotal));
				
				const colorsFirst = parseInt($('.colors_first').val()) || 0;
				let colorsFirstEq = `${colorsFirst} x $50`;
				let colorsFirstTotal = colorsFirst * 50;

				if (colorsFirst > 1) {
					colorsFirstEq += ` + ${quantity} x $.50`;
					colorsFirstTotal += colorsFirst * .5;
				}

				let colorsSecond = parseInt($('.colors_second').val()) || 0;
				let colorsSecondEq = `${colorsSecond} x $50`;
				let colorsSecondTotal = colorsSecond * 50;
				if (colorsSecond > 1) {
					colorsSecondEq += ` + ${quantity} x $.50`;
					colorsSecondTotal += colorsSecond * 1;
				}
				console.log('colorsSecond', colorsSecond);

				const sameAsFirst = $('.same_as_first').is(":checked");
				console.log("sameAsFirst",sameAsFirst);
				if (sameAsFirst) {
					colorsSecond = colorsFirst;
					colorsSecondEq = `${quantity} x $1.00`
					colorsSecondTotal += colorsSecond * 1;
				}
				

				
				$('.cart_totals td:eq(4)').text(colorsFirstEq);
				$('.cart_totals td:eq(5)').text(USDollar.format(colorsFirstTotal));

				$('.cart_totals td:eq(7)').text(colorsSecondEq);
				$('.cart_totals td:eq(8)').text(USDollar.format(colorsSecondTotal));
				const estimate = USDollar.format(colorsFirstTotal + colorsSecondTotal + quantityTotal);
				$('.cart_totals td:eq(11)').text(estimate);
				$('.hidden-wrap input').val(estimate);


			});
		},
		groupFields: () => {
			$('.field-group-top').parents('.nf-row').addClass('group-top');
			$('.field-group-middle').parents('.nf-row').addClass('group-middle');
			$('.field-group-bottom').parents('.nf-row').addClass('group-bottom');
		}
    };
    return app;
}(document, window, jQuery));
jQuery(document).on( 'nfFormReady', function() {
	arcon.init();
});
